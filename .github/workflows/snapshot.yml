name: Webpage Snapshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to snapshot'
        required: true
        default: 'https://example.com'
      dir_name:
        description: 'Output directory name'
        required: true
        default: 'snapshot.mhtml'

jobs:
  snapshot:
    name: Snapshot
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p downloads/snapshot

      - name: Install HTTrack
        run: |
          sudo apt-get update
          sudo apt-get install -y httrack
          which httrack
          httrack --version

      - name: Mirror website with HTTrack
        env:
          URL: ${{ inputs.url }}
          DIR_NAME: ${{ inputs.dir_name }}
        run: |
          echo "Starting website mirror..."
          echo "URL: $URL"
          echo "Output directory: downloads/snapshot/$DIR_NAME"

          # Mirror the website with HTTrack
          # -rN: max depth N (here depth 3 for reasonable coverage)
          # -%v: verbose output
          # -O: output directory
          # --robots=0: ignore robots.txt
          # -K: keep original file structure
          # -C: continue interrupted downloads
          # --disable-security-limits: bypass some security checks
          httrack "$URL" \
            -r3 \
            -%v \
            -O "downloads/snapshot/$DIR_NAME" \
            --robots=0 \
            -K \
            --max-rate=0 \
            -C \
            --disable-security-limits \
            || echo "HTTrack completed with some errors (some files may be missing)"

          echo "Mirror complete"
          echo "Files saved to: downloads/snapshot/$DIR_NAME"
          ls -la "downloads/snapshot/$DIR_NAME" || echo "Output directory not found"

      - name: Commit and push snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/snapshot/ || true
          git commit -m "mown: Snapshot of $URL" || echo "No changes to commit"
          git push || echo "Push failed or no changes"

      - name: Upload snapshot as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.dir_name }}
          path: downloads/snapshot/${{ inputs.dir_name }}
          retention-days: 1
          if-no-files-found: warn

      - name: Cleanup old snapshots
        run: |
          set -e
          cd downloads/snapshot 2>/dev/null || exit 0

          # Count snapshot directories and zip files
          SNAPSHOT_COUNT=$(find . -maxdepth 1 \( -type d -o -name "*.zip" \) | wc -l)

          if [ "$SNAPSHOT_COUNT" -gt 20 ]; then
            echo "Too many snapshots ($SNAPSHOT_COUNT), cleaning up old ones..."
            # Remove oldest directories
            find . -maxdepth 1 -type d -printf '%T@ %p\n' 2>/dev/null | \
              sort -rn | tail -n +21 | cut -d' ' -f2- | while read dir; do
              if [ -n "$dir" ] && [ "$dir" != "." ]; then
                echo "Removing old snapshot: $dir"
                rm -rf "$dir"
              fi
            done

            # Remove oldest zip files
            find . -maxdepth 1 -name "*.zip" -printf '%T@ %p\n' 2>/dev/null | \
              sort -rn | tail -n +21 | cut -d' ' -f2- | while read file; do
              if [ -n "$file" ]; then
                echo "Removing old snapshot: $file"
                rm -f "$file"
              fi
            done

            # Commit cleanup
            cd ../..
            git add -A
            git commit -m "mown: Auto cleanup old snapshots" || true
            git push || true
          fi
