name: Mown Direct Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct file URL'
        required: true
        type: string
      filename:
        description: 'Output filename'
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create downloads directory
        run: mkdir -p downloads/files

      - name: Download file
        env:
          URL: ${{ inputs.url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          if [ -f "downloads/files/$FILENAME" ]; then
            echo "File already exists, skipping download"
          else
            curl -L --retry 3 --connect-timeout 10 --max-time 0 -o "downloads/files/$FILENAME" "$URL"
            echo "Downloaded: downloads/files/$FILENAME"
          fi

      - name: Split large files
        run: |
          MAX_SIZE=$((95 * 1024 * 1024))
          CHUNK_SIZE=$((90 * 1024 * 1024))

          cd downloads/files
          for file in *; do
            [ -f "$file" ] || continue
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo 0)
            if [ "$size" -gt "$MAX_SIZE" ]; then
              echo "Splitting large file: $file ($size bytes)"
              base="${file%.*}"
              ext="${file##*.}"

              split -b "$CHUNK_SIZE" -d -a 2 "$file" "${base}part"

              part_num=1
              for part in "${base}part"*; do
                [ -f "$part" ] || continue
                zip -q "${base}part$(printf '%02d' $part_num).zip" "$part"
                rm -f "$part"
                part_num=$((part_num + 1))
              done

              rm -f "$file"
              echo "Split into $((part_num - 1)) parts"
            fi
          done
          cd ../..

      - name: Update history.json
        run: |
          if [ ! -f history.json ]; then
            echo "[]" > history.json
          fi

          FILENAME="${{ inputs.filename }}"
          EXT="${FILENAME##*.}"
          BASE_NAME="${FILENAME%.*}"
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          cd downloads/files

          IS_SPLIT=false
          FILE_SIZE=0
          PARTS_JSON="[]"

          if ls ${BASE_NAME}part*.zip 1>/dev/null 2>&1; then
            IS_SPLIT=true
            PARTS_COUNT=$(ls -1 ${BASE_NAME}part*.zip 2>/dev/null | wc -l || echo 0)

            PARTS_ARRAY=""
            for i in $(seq 1 $PARTS_COUNT); do
              PART_NUM=$(printf '%02d' $i)
              PART_FILE="${BASE_NAME}part${PART_NUM}.zip"
              if [ -f "$PART_FILE" ]; then
                [ -n "$PARTS_ARRAY" ] && PARTS_ARRAY="${PARTS_ARRAY},"
                PART_SIZE=$(stat -c%s "$PART_FILE" 2>/dev/null || stat -f%z "$PART_FILE" 2>/dev/null || echo 0)
                PARTS_ARRAY="${PARTS_ARRAY}{\"filename\":\"${PART_FILE}\",\"size\":${PART_SIZE}}"
              fi
            done
            PARTS_JSON="[${PARTS_ARRAY}]"
          elif [ -f "$FILENAME" ]; then
            FILE_SIZE=$(stat -c%s "$FILENAME" 2>/dev/null || stat -f%z "$FILENAME" 2>/dev/null || echo 0)
          else
            echo "No file found for: $FILENAME, skipping history update"
            exit 0
          fi

          TITLE=$(echo "$FILENAME" | jq -Rs '.[:-1] // .')

          EXISTS=$(jq --arg fn "$FILENAME" '[.[] | select(.filename == $fn and .type == "direct")] | length' ../../history.json)

          if [ "$EXISTS" -eq 0 ]; then
            jq --arg id "$(date +%s)-${RANDOM}" \
               --arg filename "$FILENAME" \
               --arg title "$TITLE" \
               --arg githubUrl "https://github.com/${{ github.repository }}/blob/main/downloads/files/$FILENAME" \
               --arg type "direct" \
               --arg format "$EXT" \
               --arg size "$FILE_SIZE" \
               --arg createdAt "$TIMESTAMP" \
               --arg runId "${{ github.run_id }}" \
               --argjson isSplit "$IS_SPLIT" \
               --argjson parts "$PARTS_JSON" \
               '. += [{
                 id: $id,
                 filename: $filename,
                 title: $title,
                 githubUrl: $githubUrl,
                 thumbnail: "",
                 type: $type,
                 quality: "",
                 format: $format,
                 duration: "",
                 size: $size,
                 createdAt: $createdAt,
                 isSplit: $isSplit,
                 parts: $parts,
                 runId: $runId
               }]' ../../history.json > ../../history.json.tmp && mv ../../history.json.tmp ../../history.json

            echo "Added to history.json: $FILENAME"
          fi

          cd ../..

          jq '.[-100:]' history.json > history.json.tmp && mv history.json.tmp history.json

      - name: Commit and push
        run: |
          set -e
          git config user.name "mown Downloader"
          git config user.email "mown@system.local"

          git add downloads/files/ history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "mown: Download $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase origin main
            git push
            echo "Committed and pushed"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: download
          path: downloads/files/
          retention-days: 1
